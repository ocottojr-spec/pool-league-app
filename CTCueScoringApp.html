<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Connecticut Cue Sports Tracker</title>
</head>

<body style="
  font-family: Arial;
  padding: 15px;
  max-width: 500px;
  margin: auto;
  background-color: #111;
  color: white;
">

  <h2 style="text-align:center;">Pool League Score Tracker</h2>

  <!-- DATE -->
  <div style="margin-bottom:15px;">
    <label>Game Date:</label>
    <input type="date" id="gameDate" style="width:100%; padding:10px; margin-top:5px;">
  </div>

  <!-- ADD PLAYER -->
  <div style="display:flex; gap:10px; margin-bottom:15px;">
    <input 
      id="name" 
      placeholder="Player name"
      style="flex:1; padding:12px; font-size:16px;"
    />
    <button onclick="addPlayer()" style="padding:12px;">
      Add
    </button>
  </div>

  <div id="players"></div>

  <!-- SEND BUTTON -->
  <button 
    onclick="sendText()"
    style="
      margin-top:20px;
      width:100%;
      padding:15px;
      font-size:18px;
      background-color:#c9a641;
      color:black;
      border:none;
      border-radius:5px;
      font-weight:bold;
    "
  >
    Send Scores via Text
  </button>
